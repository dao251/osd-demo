<!DOCTYPE html>
<html>
<head>
    <title>drawer demo</title>
    <script type="text/javascript" src='../../build/openseadragon/openseadragon.js'></script>
    <style type="text/css">
        .openseadragon1 {
            /* left: 1px; */
            width: 512px;
            height: 768px;
            border: 1px solid rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>
    <div>
        <p>Big JPEG image - 90MB, 80MP (7479x11146 px)</p>
        <p>tiled to PNG 256x256 no overlap</p>
    </div>
    <div style="display: flex; gap: 10px;">
        <div id="content1" class="openseadragon1"></div>
        <div style="display:flex; flex-direction:column;">
            <label>Viewer</label>
            <label><input type="checkbox" onchange="debug(this.checked)">Tile Grid</label>
            <!-- <label> </label> -->
            <div style="border-bottom:1px solid #000;"></div>
            <label>Image</label>
            <label><input type="checkbox" onchange="rotate(this.checked * 30)">Rotate</label>
            <label><input type="checkbox" onchange="flip(this.checked)">Flip</label>
            <label><input type="checkbox" onchange="clip(this.checked)">Clip</label>
            <label><input type="checkbox" onchange="opacity(this.checked?.8:1)">Opacity</label>
        </div>
        <div id="content2" class="openseadragon1"></div>
    </div>
    <pre id="out"></pre>

    <script id="code" type="text/javascript">

        const viewerOptions = {
            prefixUrl: "../../build/openseadragon/images/",

            showRotationControl: true,
            showFlipControl: true,
            showNavigator: true,
            // wrapHorizontal:     true,  // is NOT supported yet !!!!!!!!

            rotationIncrement: 22.5,
            zoomPerScroll: Math.sqrt(Math.SQRT2),

            minZoomLevel: 0.01,
            maxZoomPixelRatio: 2.00,
            // minPixelRatio: 1/window.devicePixelRatio,

            // debugMode: true,
        };

        let viewer1 = OpenSeadragon({...viewerOptions, ...{drawer: 'drawer', id: "content1"} });
        let viewer2 = OpenSeadragon({...viewerOptions, ...{drawer: 'canvas', id: "content2"} });

        const images =[
            // {
            //     tileSource: { type:"image", url:"../../test/data/BBlue.png", tileWidth: 131, tileHeight: 251 },
            // },
            // {
            //     tileSource: { type:"image", url:"../../test/data/gray_4096.png", tileSize: 256 },
            // },
            {
                tileSource: "../../test/data/monalisa.dzi",
            },
            // {
            //     tileSource: { type: 'openstreetmaps' }
            // },
            // {
            //     tileSource: {
            //         iipsrv: "https://merovingio.c2rmf.cnrs.fr/fcgi-bin/iipsrv.fcgi",
            //         image:  "77917.ome.tif",
            //         format: "jpg",
            //         transform:  {
            //             contrast: 1.5,
            //             twist: "[0,0,1;0,1,0;0.9,0,0.1]"
            //         }
            //     }
            // }
        ]

        const activeImage = images.length - 1;

        for(let i=0; i<images.length; i++){
            viewer1.addTiledImage(images[i]);
            viewer2.addTiledImage(images[i]);
        }


        let isSyncing = false;

        const syncHandler = (event) => {
            const me    = event.eventSource;
            const other = ( me === viewer1 ? viewer2 : viewer1);
            if (!isSyncing){
                isSyncing = true;
                other.viewport.zoomTo(me.viewport.getZoom());
                other.viewport.panTo(me.viewport.getCenter());
                other.viewport.rotateTo(me.viewport.getRotation());
                other.viewport.setFlip(me.viewport.flipped);
                isSyncing = false;
            }
        }

        const addSyncHandlers = (viewer)=>{
            viewer.addHandler('zoom', syncHandler);
            viewer.addHandler('pan', syncHandler);
            viewer.addHandler('rotate', syncHandler);
            viewer.addHandler('flip', syncHandler);
        }

        addSyncHandlers(viewer1);
        addSyncHandlers(viewer2);

        function debug(v) {
            viewer1.setDebugMode(v);
            viewer2.setDebugMode(v);
        }

        function flip(v) {
            viewer1.world.getItemAt(activeImage).setFlip(v);
            viewer2.world.getItemAt(activeImage).setFlip(v);
        }

        function clip(v) {
            const rect = (v ? new OpenSeadragon.Rect(2169,685,2979,4468): undefined);
            viewer1.world.getItemAt(activeImage).setClip(rect);
            viewer2.world.getItemAt(activeImage).setClip(rect);
        }

        function rotate(v) {
            viewer1.world.getItemAt(activeImage).setRotation(v);
            viewer2.world.getItemAt(activeImage).setRotation(v);
        }

        function opacity(v) {
            viewer1.world.getItemAt(activeImage).setOpacity(v);
            viewer2.world.getItemAt(activeImage).setOpacity(v);
        }


    </script>
    <script>
        document.getElementById("out").textContent =
            document.getElementById("code").textContent;
    </script>
</body>
</html>
